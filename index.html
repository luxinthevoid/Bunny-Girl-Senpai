<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris UJI (minimal)</title>
  <link rel="stylesheet" href="css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap" rel="stylesheet">
</head>
<body>
  <div id="wrap">
    <div id="game-container">

      <div id="game"></div>

      <div id="HUD">
        <div id="hud-info">

          <div class="hud-block">
            <span class="hud-label">Nivel</span>
            <span class="hud-value" id="intNivel">0</span>
          </div>

          <div class="hud-block">
            <span class="hud-label">Tiempo</span>
            <div class="timer-row">
              <span id="minutos">00</span>
              <span class="hud-colon">:</span>
              <span id="segundos">00</span>
            </div>
          </div>

          <div class="hud-block">
            <span class="hud-label">Puntuación</span>
            <span class="hud-value" id="intPuntos">0</span>
          </div>

          <div class="hud-block">
            <span class="hud-label">Líneas</span>
            <span class="hud-value" id="intLineas">0</span>
          </div>

          <div class="hud-block">
            <span class="hud-label">Objetivo</span>
            <span class="hud-value" id="intObjetivo">0</span>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="js/lib/phaser.js"></script>
  <script src="js/estilos.js"></script>
  <script src="js/init.js"></script>
  <script src="js/menuNiveles.js"></script>
  <script src="js/game.js"></script>
  <script src="js/hof.js"></script>
  <script src="js/creditos.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
